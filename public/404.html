<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | FIB__R</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f9e9d9; /* Ton fond beige */
      color: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .error-container {
      background-color: #ffffff;
      padding: 3.5rem 2rem;
      border-radius: 1rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      max-width: 500px;
      width: 90%;
    }

    h1 {
      font-size: 6rem;
      margin: 0;
      line-height: 1;
      color: #1a1a1a;
      font-weight: 700;
    }

    h2 {
      font-size: 1.5rem;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      font-weight: 600;
    }

    p {
      color: #666666;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      background-color: #212529; /* Bouton noir style Bootstrap */
      color: #ffffff;
      text-decoration: none;
      padding: 12px 40px;
      border-radius: 50px; /* Effet pilule */
      font-weight: 600;
      text-transform: uppercase;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .btn:hover {
      background-color: #424649;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="error-container">
    <h1>404</h1>
    <h2>Page not found</h2>
    <p>Oops! Looks like this thread got lost. The page you are looking for doesn't exist or has been moved to another wardrobe.</p>
    <a href="/" class="btn">GO BACK HOME</a>
  </div>
</body>
</html>
